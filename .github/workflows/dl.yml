name: Download & Strip YouTube APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'YouTube Version'
        required: true
        default: '20.05.46'
      outFile:
        description: 'Output filename'
        required: true
        default: 'youtube-20.05.46.apk'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download apktool
        run: |
          echo "⬇️ Fetching latest apktool JAR URL..."
          APKTOOL_URL=$(curl -sL https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print([a['browser_download_url'] for a in d['assets'] if a['name'].endswith('.jar')][0])")
          
          echo "⬇️ Downloading apktool..."
          wget -q --show-progress -O apktool.jar "$APKTOOL_URL"
          echo "✅ apktool ready: $(ls -lh apktool.jar | awk '{print $5}')"

      - name: Download apkmd Binary
        run: |
          echo "⬇️ Downloading latest apkmd..."
          wget -q --show-progress -O apkmd \
            "https://github.com/tanishqmanuja/apkmirror-downloader/releases/latest/download/apkmd"
          chmod +x apkmd
          echo "✅ apkmd ready!"

      - name: Download YouTube APK from APKMirror
        run: |
          cat > apps.json <<'EOF'
          {
            "options": {
              "outDir": ".",
              "overwrite": true
            },
            "apps": [
              {
                "org": "google-inc",
                "repo": "youtube",
                "version": "${{ github.event.inputs.version || '20.05.46' }}",
                "outFile": "youtube-original.apk",
                "type": "apk",
                "arch": "universal",
                "dpi": "nodpi"
              }
            ]
          }
          EOF
          
          echo "🚀 Downloading original APK..."
          ./apkmd apps.json
          
          echo "📦 Original size:"
          ls -lh youtube-original.apk

      - name: Decompile APK
        run: |
          echo "🔧 Decompiling with apktool..."
          java -jar apktool.jar d youtube-original.apk -o youtube_decompiled -f

      - name: Strip libs (keep only armeabi-v7a)
        run: |
          echo "🗑️ Stripping non-armv7 libraries..."
          
          if [ ! -d "youtube_decompiled/lib" ]; then
            echo "⚠️ No lib folder found, skipping strip"
            exit 0
          fi
          
          echo "Before:"
          ls -la youtube_decompiled/lib/
          
          # Hapus semua kecuali armeabi-v7a
          for arch in arm64-v8a armeabi x86 x86_64 mips mips64; do
            if [ -d "youtube_decompiled/lib/$arch" ]; then
              echo "  Removing lib/$arch ..."
              rm -rf "youtube_decompiled/lib/$arch"
            fi
          done
          
          echo "After:"
          ls -la youtube_decompiled/lib/

      - name: Rebuild APK (unsigned)
        run: |
          echo "🔨 Rebuilding stripped APK..."
          java -jar apktool.jar b youtube_decompiled -o "${{ github.event.inputs.outFile || 'youtube-20.05.46.apk' }}"
          
          echo "📦 Final size:"
          ls -lh "${{ github.event.inputs.outFile || 'youtube-20.05.46.apk' }}"

      - name: Verify size under 100MB
        run: |
          FILE="${{ github.event.inputs.outFile || 'youtube-20.05.46.apk' }}"
          SIZE=$(stat -c%s "$FILE")
          LIMIT=104857600  # 100MB in bytes
          
          echo "Size: $SIZE bytes"
          
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "❌ Still too big ($SIZE bytes) after strip. Cannot push to GitHub."
            exit 1
          fi
          
          echo "✅ Size OK: under 100MB"

      - name: Cleanup build files
        run: |
          rm -rf youtube_decompiled youtube-original.apk apps.json apkmd apktool.jar

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit & Push to Root
        run: |
          FILE="${{ github.event.inputs.outFile || 'youtube-20.05.46.apk' }}"
          
          git add "$FILE"
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          git commit -m "📥 YouTube ${{ github.event.inputs.version || '20.05.46' }} armv7-stripped [run ${{ github.run_id }}]"
          git push
          echo "✅ Pushed $FILE to repository root"
